name: Gardener

on:
  workflow_dispatch:
    inputs:
      focus:
        description: 'Area to focus on (e.g. tests, deps, docs, performance)'
        required: false
        default: 'general maintenance'
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: write
  pull-requests: write

jobs:
  garden:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          focus: ${{ inputs.focus || 'general maintenance' }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
